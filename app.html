<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathsPal Student App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tick { stroke: #fbbf24; stroke-width: 6; fill: none; stroke-linecap: round; }
        .circle { stroke: #ef4444; stroke-width: 4; fill: none; }
        .loader { border: 6px solid #f3f3f3; border-top: 6px solid #fbbf24; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        video { width: 100%; border-radius: 24px; background: black; transform: scaleX(1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <!-- 1. STUDENT ENTRY -->
    <div id="view-landing" class="min-h-screen flex flex-col items-center justify-center p-6 text-center space-y-6">
        <h1 class="text-5xl font-black italic">Maths<span class="text-yellow-500 underline">Pal</span></h1>
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-xs space-y-4 border border-slate-100">
            <input id="codeInput" type="text" placeholder="CLASS CODE" class="w-full p-4 border-2 border-slate-100 rounded-2xl text-center font-black uppercase outline-none focus:border-yellow-400">
            <input id="nameInput" type="text" placeholder="YOUR NAME" class="w-full p-4 border-2 border-slate-100 rounded-2xl text-center font-bold outline-none focus:border-yellow-400">
            
            <div class="border-4 border-dashed border-slate-100 p-6 rounded-2xl space-y-4 relative">
                <p id="statusLabel" class="font-bold text-slate-400 text-[10px] uppercase">Capture Pages</p>
                <div class="flex gap-2">
                    <button onclick="openCamera()" class="flex-1 bg-yellow-400 py-4 rounded-xl text-xl shadow-md active:scale-95 transition">📸</button>
                    <button onclick="document.getElementById('galleryIn').click()" class="flex-1 bg-slate-900 text-white py-4 rounded-xl text-xl shadow-md active:scale-95 transition">🖼️</button>
                </div>
                <button id="resetBtn" onclick="resetAll()" class="hidden absolute -top-4 -right-2 bg-red-500 text-white w-8 h-8 rounded-full font-black shadow-lg">✕</button>
                <input type="file" id="galleryIn" class="hidden" accept="image/*" multiple onchange="addGalleryFiles(this.files)" />
            </div>

            <button onclick="handleGrade()" class="w-full py-4 bg-slate-900 text-yellow-400 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition uppercase">Grade Batch</button>
        </div>
    </div>

    <!-- 2. LIVE CAMERA VIEWFINDER -->
    <div id="view-camera" class="hidden fixed inset-0 bg-black z-50 flex flex-col p-6 space-y-6 text-center">
        <div class="flex justify-between items-center text-white">
            <span class="text-[10px] font-black uppercase tracking-widest opacity-50 text-yellow-400">Live Lens</span>
            <button onclick="closeCamera()" class="text-white font-bold text-xs uppercase">Cancel</button>
        </div>
        <video id="video" autoplay playsinline></video>
        <div class="flex justify-center py-4">
            <button onclick="snap()" class="w-20 h-20 bg-white rounded-full border-8 border-slate-800 shadow-2xl active:scale-90 transition"></button>
        </div>
        <p class="text-white/40 text-[10px] font-bold uppercase tracking-widest italic">Center the box & tap the white button</p>
    </div>

    <!-- 3. LOADING -->
    <div id="view-loading" class="hidden min-h-screen flex flex-col items-center justify-center p-10 text-center space-y-4 bg-white">
        <div class="loader"></div>
        <h2 class="text-xl font-bold italic">Optimizing & Scanning...</h2>
        <p id="loadMsg" class="text-slate-400 text-xs font-bold uppercase tracking-widest">Shrinking photos for speed</p>
    </div>

    <!-- 4. RESULTS -->
    <div id="view-preview" class="hidden">
        <div class="bg-slate-900 text-white p-4 flex justify-between items-center sticky top-0 shadow-lg font-bold text-xs">
            <button onclick="location.reload()">← EXIT</button>
            <span id="scoreBadge" class="bg-green-600 px-3 py-1 rounded uppercase tracking-tighter italic">SCORE: --</span>
        </div>
        <div class="p-6 flex flex-col items-center bg-slate-800 min-h-screen space-y-4" id="resultsList"></div>
    </div>

    <script>
        const RENDER_URL = 'https://mathspal-backend.onrender.com/grade';
        let batch = [];
        let stream = null;

        function show(v) {
            ['landing','camera','loading','preview'].forEach(id => document.getElementById('view-'+id).classList.add('hidden'));
            document.getElementById('view-'+v).classList.remove('hidden');
        }

        async function openCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                document.getElementById('video').srcObject = stream;
                show('camera');
            } catch (err) { alert("Camera Error: Please use Chrome or Safari"); }
        }

        function closeCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            show('landing');
        }

        async function compress(file) {
            return new Promise(res => {
                const r = new FileReader();
                r.readAsDataURL(file);
                r.onload = e => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > 1200) { h *= 1200 / w; w = 1200; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        canvas.toBlob(blob => res(new File([blob], file.name, {type:'image/jpeg'})), 'image/jpeg', 0.7);
                    };
                };
            });
        }

        async function snap() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(async blob => {
                const f = await compress(new File([blob], "snap.jpg", {type:'image/jpeg'}));
                batch.push(f);
                updateUI();
                closeCamera();
            }, 'image/jpeg', 0.7);
        }

        async function addGalleryFiles(files) {
            for (let f of files) batch.push(await compress(f));
            updateUI();
        }

        function updateUI() {
            document.getElementById('statusLabel').innerText = `✅ ${batch.length} PAGES READY`;
            document.getElementById('resetBtn').classList.remove('hidden');
        }

        function resetAll() {
            batch = [];
            document.getElementById('statusLabel').innerText = "Capture Your Work";
            document.getElementById('resetBtn').classList.add('hidden');
        }

        async function handleGrade() {
            const code = document.getElementById('codeInput').value.trim();
            const name = document.getElementById('nameInput').value.trim();
            if (!code || !name || batch.length === 0) return alert("Missing Data!");

            show('loading');
            const fd = new FormData();
            fd.append('student_name', name);
            fd.append('short_code', code.toUpperCase());
            batch.forEach(f => fd.append('files', f));

            try {
                const res = await fetch(RENDER_URL, { method: 'POST', body: fd });
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('scoreBadge').innerText = "SCORE: " + data.score;
                    document.getElementById('resultsList').innerHTML = data.results.map(r => `
                        <div class="bg-white rounded-xl w-full max-w-[340px] p-6 flex justify-between items-center shadow-xl">
                            <span class="font-black text-slate-300 italic text-xl uppercase">Q${r.q}</span>
                            <div class="relative w-16 h-10 border-2 border-slate-100 rounded flex items-center justify-center">
                                <svg viewBox="0 0 100 100" class="absolute inset-0 w-full h-full">
                                    ${r.status === 'correct' ? '<path d="M 20 50 L 45 75 L 80 25" class="tick" />' : '<circle cx="50" cy="50" r="40" class="circle" />'}
                                </svg>
                            </div>
                        </div>`).join('') + `<button onclick="location.reload()" class="w-full max-w-[340px] mt-6 py-4 bg-yellow-400 text-slate-900 rounded-2xl font-black shadow-xl uppercase">Done</button>`;
                    show('preview');
                } else { alert(data.error); show('landing'); }
            } catch (e) { alert("Connection error"); show('landing'); }
        }
    </script>
</body>
</html>
