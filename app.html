<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathsPal Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tick { stroke: #fbbf24; stroke-width: 6; fill: none; stroke-linecap: round; }
        .circle { stroke: #ef4444; stroke-width: 4; fill: none; }
        .loader { border: 4px solid #f3f3f3; border-top: 6px solid #fbbf24; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans text-center">

    <div id="view-landing" class="min-h-screen flex flex-col items-center justify-center p-6 space-y-6">
        <h1 class="text-5xl font-black italic">Maths<span class="text-yellow-500 underline">Pal</span></h1>
        
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-xs space-y-4 border border-slate-100">
            <input id="codeInput" type="text" placeholder="CLASS CODE" class="w-full p-4 border-2 border-slate-100 rounded-2xl text-center font-black uppercase outline-none focus:border-yellow-400">
            <input id="nameInput" type="text" placeholder="YOUR NAME" class="w-full p-4 border-2 border-slate-100 rounded-2xl text-center font-bold outline-none focus:border-yellow-400">
            
            <div class="border-4 border-dashed border-slate-100 p-6 rounded-2xl space-y-4 relative">
                <p id="statusLabel" class="font-bold text-slate-400 text-[10px] uppercase">Capture Your Work</p>
                
                <!-- PHOTO ACTIONS -->
                <div id="photo-actions" class="flex gap-2">
                    <button onclick="document.getElementById('fileIn').click()" class="flex-1 bg-yellow-400 py-4 rounded-xl text-xl shadow-md active:scale-95 transition">📸</button>
                </div>

                <!-- REPLACE BUTTON (Hidden until photo is picked) -->
                <button id="replaceBtn" onclick="resetPhotos()" class="hidden absolute -top-3 -right-2 bg-red-500 text-white w-8 h-8 rounded-full font-black shadow-lg">✕</button>

                <input type="file" id="fileIn" class="hidden" accept="image/*" multiple onchange="addFiles(this.files)" />
            </div>

            <button onclick="handleGrade()" class="w-full py-4 bg-slate-900 text-yellow-400 rounded-2xl font-black text-xl shadow-lg uppercase">Grade Now</button>
        </div>
    </div>

    <!-- LOADING & PREVIEW SCREENS REMAIN THE SAME BUT UPDATED FOR BATCH -->
    <div id="view-loading" class="hidden min-h-screen flex flex-col items-center justify-center p-10 bg-white">
        <div class="loader mb-4"></div>
        <h2 class="text-xl font-bold italic">AI is Grading...</h2>
    </div>

    <div id="view-preview" class="hidden min-h-screen bg-slate-800 p-6">
        <div id="scoreHeader" class="text-white font-black text-2xl mb-6">SCORE: --</div>
        <div id="resultsList" class="space-y-4 flex flex-col items-center"></div>
        <button onclick="location.reload()" class="mt-8 text-yellow-400 font-bold underline uppercase tracking-widest">Done</button>
    </div>

    <script>
        const RENDER_URL = 'https://mathspal-backend.onrender.com/grade';
        let allFiles = [];

        function addFiles(fileList) {
            allFiles = Array.from(fileList);
            document.getElementById('statusLabel').innerText = `✅ ${allFiles.length} PHOTOS READY`;
            document.getElementById('replaceBtn').classList.remove('hidden');
        }

        function resetPhotos() {
            allFiles = [];
            document.getElementById('fileIn').value = '';
            document.getElementById('statusLabel').innerText = "Capture Your Work";
            document.getElementById('replaceBtn').classList.add('hidden');
        }

        async function handleGrade() {
            const code = document.getElementById('codeInput').value.trim();
            const name = document.getElementById('nameInput').value.trim();
            if (!code || !name || allFiles.length === 0) return alert("Missing Code, Name, or Photo!");

            document.getElementById('view-landing').classList.add('hidden');
            document.getElementById('view-loading').classList.remove('hidden');

            const fd = new FormData();
            fd.append('student_name', name);
            fd.append('short_code', code.toUpperCase());
            allFiles.forEach(f => fd.append('files', f));

            try {
                const res = await fetch(RENDER_URL, { method: 'POST', body: fd });
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('scoreHeader').innerText = "SCORE: " + data.score;
                    document.getElementById('resultsList').innerHTML = data.results.map(r => `
                        <div class="bg-white rounded-xl w-full max-w-[340px] p-6 flex justify-between items-center shadow-xl">
                            <span class="font-black text-slate-300 italic">Q${r.q}</span>
                            <div class="relative w-16 h-10 border-2 border-slate-100 rounded flex items-center justify-center">
                                <svg viewBox="0 0 100 100" class="absolute inset-0 w-full h-full">
                                    ${r.status === 'correct' ? '<path d="M 20 50 L 45 75 L 80 25" class="tick" />' : '<circle cx="50" cy="50" r="40" class="circle" />'}
                                </svg>
                            </div>
                        </div>`).join('');
                    document.getElementById('view-loading').classList.add('hidden');
                    document.getElementById('view-preview').classList.remove('hidden');
                } else { alert(data.error); location.reload(); }
            } catch (e) { alert("Connection error"); location.reload(); }
        }
    </script>
</body>
</html>
