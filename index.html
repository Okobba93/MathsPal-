<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathsPal - Safe Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tick { stroke: #fbbf24; stroke-width: 6; fill: none; stroke-linecap: round; }
        .circle { stroke: #ef4444; stroke-width: 4; fill: none; }
        .loader { border: 6px solid #f3f3f3; border-top: 6px solid #fbbf24; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>
    <script>
        // --- !!! CHECK THIS ID CAREFULLY !!! ---
        const ASSIGNMENT_ID = '14ddbc09-0c61-480a-a203-f88d9109d3f7'; 
        const RENDER_URL = 'https://mathspal-backend.onrender.com/grade';

        let view = 'landing', results = [], finalScore = "";

        async function runBatchGrading() {
            const files = document.getElementById('fileIn').files;
            const name = document.getElementById('nameInput').value;
            if (!name || files.length === 0) return alert("Enter name and select photo!");
            
            view = 'loading'; render();
            const fd = new FormData();
            for (let i = 0; i < files.length; i++) fd.append('files', files[i]);
            fd.append('student_name', name);
            fd.append('assignment_id', ASSIGNMENT_ID);

            try {
                const res = await fetch(RENDER_URL, { method: 'POST', body: fd });
                const data = await res.json();

                // SAFETY SHIELD: Check if the server actually succeeded
                if (data.status === "success") {
                    results = data.results; 
                    finalScore = data.score;
                    view = 'preview'; 
                } else {
                    // Show the specific error from the server (e.g. "ID not found")
                    alert("SERVER ERROR: " + (data.error || "Unknown error"));
                    view = 'landing';
                }
                render();
            } catch (e) {
                alert("CONNECTION ERROR: " + e.message);
                view = 'landing'; render();
            }
        }

        function render() {
            const root = document.getElementById('root');
            if (view === 'landing') {
                root.innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center space-y-6">
                    <h1 class="text-5xl font-black italic">Maths<span class="text-yellow-500 underline">Pal</span></h1>
                    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-xs space-y-4 text-center">
                        <input id="nameInput" type="text" placeholder="YOUR NAME" class="w-full p-4 border-2 border-slate-100 rounded-2xl text-center font-bold outline-none">
                        <div onclick="document.getElementById('fileIn').click()" class="border-4 border-dashed border-slate-100 p-6 rounded-2xl cursor-pointer">
                            <p id="status" class="font-bold text-slate-400 text-xs uppercase">📸 SELECT PHOTO (CROP SMALL!)</p>
                            <input type="file" id="fileIn" class="hidden" accept="image/*" onchange="document.getElementById('status').innerText='READY'" />
                        </div>
                        <button onclick="runBatchGrading()" class="w-full py-4 bg-slate-900 text-yellow-400 rounded-2xl font-black text-xl shadow-lg">Grade Now</button>
                    </div>
                </div>`;
            } else if (view === 'loading') {
                root.innerHTML = `<div class="min-h-screen flex flex-col items-center justify-center p-10 text-center space-y-4"><div class="loader"></div><h2 class="text-xl font-bold">Connecting to AI...</h2></div>`;
            } else if (view === 'preview') {
                root.innerHTML = `
                <div class="bg-slate-900 text-white p-4 flex justify-between items-center sticky top-0 shadow-lg font-bold text-xs uppercase">
                    <button onclick="view='landing';render()">← BACK</bu
