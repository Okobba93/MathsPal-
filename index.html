<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathsPal | AI Math Grading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-gradient { background: radial-gradient(circle at top right, #fefce8, #f8fafc); }
    </style>
</head>
<body class="bg-white text-slate-900 hero-gradient min-h-screen font-sans">
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-2xl font-800 italic tracking-tighter">Maths<span class="text-yellow-500 underline decoration-wavy decoration-slate-900 text-2xl">Pal</span></h1>
        <button onclick="location.href='admin.html'" class="text-[10px] font-black uppercase tracking-widest border-b-2 border-slate-900 pb-1">Teacher Portal</button>
    </nav>

    <div class="max-w-4xl mx-auto px-6 pt-10 pb-20 text-center space-y-8">
        <div class="inline-block bg-yellow-100 text-yellow-700 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.2em] mb-4">
            🚀 The Future of CBE Grading
        </div>
        <h2 class="text-5xl md:text-7xl font-800 tracking-tight leading-tight text-slate-900">
            Grade Math in <span class="text-yellow-500">Seconds</span>, Not Hours.
        </h2>
        <p class="text-slate-500 text-lg md:text-xl font-medium max-w-2xl mx-auto leading-relaxed">
            The first AI grading companion built for the modern classroom. Simply snap a photo of your handwritten math and get instant, human-like feedback.
        </p>

        <div class="flex flex-col md:flex-row gap-4 justify-center pt-6">
            <button onclick="location.href='app.html'" class="bg-yellow-400 text-slate-900 px-10 py-5 rounded-3xl font-black text-xl shadow-2xl shadow-yellow-200 active:scale-95 transition">
                STUDENT ENTRY
            </button>
            <button onclick="location.href='admin.html'" class="bg-slate-900 text-white px-10 py-5 rounded-3xl font-black text-xl shadow-2xl shadow-slate-200 active:scale-95 transition">
                TEACHER START
            </button>
        </div>
    </div>
</body>
</html>
