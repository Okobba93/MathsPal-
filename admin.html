<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathsPal Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans p-6 text-slate-900">
    <div class="max-w-md mx-auto space-y-6">
        <h1 class="text-4xl font-black italic">Maths<span class="text-yellow-500 underline">Pal</span> Admin</h1>
        
        <div id="setup-view" class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 space-y-6">
            <h2 class="font-bold text-xl text-slate-800">New Assignment</h2>
            <input id="title" type="text" placeholder="e.g. Monday Quiz" class="w-full p-4 border-2 border-slate-50 rounded-2xl bg-slate-50 outline-none focus:border-yellow-400 font-bold">
            
            <div id="q-list" class="space-y-3">
                <div class="flex gap-2 items-center">
                    <span class="font-black text-slate-300 w-8">1.</span>
                    <input class="flex-1 p-3 border rounded-xl q-ans font-bold" placeholder="Correct Answer (e.g. 25)">
                </div>
            </div>

            <button onclick="addQuestion()" class="text-blue-600 font-black text-xs uppercase tracking-widest">+ Add Question</button>
            
            <button id="saveBtn" onclick="saveToCloud()" class="w-full py-5 bg-slate-900 text-yellow-400 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition">
                SAVE & GENERATE CODE
            </button>
        </div>

        <!-- SUCCESS DISPLAY -->
        <div id="code-view" class="hidden bg-yellow-400 p-8 rounded-[2.5rem] text-center shadow-2xl space-y-2">
            <p class="text-xs font-black uppercase tracking-[0.2em] text-yellow-900">Class Code</p>
            <h3 id="displayShortCode" class="text-6xl font-black text-slate-900 tracking-tighter">---</h3>
            <p class="text-sm font-bold text-yellow-800 pt-4">Share this code with your students!</p>
            <button onclick="location.reload()" class="mt-6 text-xs font-black underline opacity-50">Create Another</button>
        </div>
    </div>

    <script>
        function addQuestion() {
            const list = document.getElementById('q-list');
            const num = list.children.length + 1;
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center";
            div.innerHTML = `<span class="font-black text-slate-300 w-8">${num}.</span><input class="flex-1 p-3 border rounded-xl q-ans font-bold" placeholder="Answer">`;
            list.appendChild(div);
        }

        async function saveToCloud() {
            const btn = document.getElementById('saveBtn');
            const title = document.getElementById('title').value;
            const answers = document.querySelectorAll('.q-ans');
            
            if(!title) return alert("Give your quiz a title!");
            
            btn.innerText = "SAVING...";
            btn.disabled = true;

            let masterKey = {};
            answers.forEach((input, index) => {
                masterKey[index + 1] = input.value;
            });

            const fd = new FormData();
            fd.append('title', title);
            fd.append('master_key', JSON.stringify(masterKey));

            try {
                const res = await fetch('https://mathspal-backend.onrender.com/create-assignment', {
                    method: 'POST',
                    body: fd
                });
                const data = await res.json();

                if (data.status === "success") {
                    document.getElementById('displayShortCode').innerText = data.short_code;
                    document.getElementById('setup-view').classList.add('hidden');
                    document.getElementById('code-view').classList.remove('hidden');
                } else {
                    alert("Error: " + data.error);
                    btn.innerText = "SAVE & GENERATE CODE";
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Connection failed. Is the server awake?");
                btn.innerText = "SAVE & GENERATE CODE";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
