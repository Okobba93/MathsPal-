<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathsPal Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans p-4 text-slate-900 pb-20">
    <div class="max-w-md mx-auto space-y-6">
        <h1 class="text-3xl font-black italic tracking-tighter">Maths<span class="text-yellow-500 underline">Pal</span> Admin</h1>
        
        <!-- QUIZ CREATOR (Same as before) -->
        <details class="bg-slate-900 rounded-3xl overflow-hidden shadow-xl border-b-4 border-yellow-500">
            <summary class="p-5 font-black text-xs uppercase cursor-pointer text-yellow-400 text-center tracking-widest">➕ Create New Quiz</summary>
            <div class="bg-white p-6 space-y-4 rounded-b-3xl">
                <input id="title" type="text" placeholder="Quiz Title" class="w-full p-4 border-2 border-slate-50 rounded-2xl outline-none font-bold">
                <div id="q-list"><div class="flex gap-2 mb-2"><input class="w-12 p-3 border rounded-xl q-num" value="1" readonly><input class="flex-1 p-3 border rounded-xl q-ans font-bold" placeholder="Ans"></div></div>
                <button onclick="addQ()" class="text-blue-600 font-black text-[10px] uppercase">+ Add Question</button>
                <button id="saveBtn" onclick="saveQuiz()" class="w-full py-4 bg-slate-900 text-yellow-400 rounded-2xl font-black shadow-lg">GENERATE CODE</button>
                <div id="codeBox" class="hidden bg-yellow-400 p-6 rounded-[2rem] text-center mt-4 font-black text-3xl">CODE: <span id="finalCode">---</span></div>
            </div>
        </details>

        <div id="assignments-container" class="space-y-6"></div>
    </div>

    <script>
        const API_URL = 'https://mathspal-backend.onrender.com';

        async function deleteQuiz(id) {
            // MINIMALIST CONFIRMATION
            if (!confirm("DELETE?")) return;
            if (!confirm("CONFIRM?")) return;
            
            const fd = new FormData();
            fd.append('assignment_id', id);
            await fetch(`${API_URL}/delete-assignment`, { method: 'POST', body: fd });
            loadDashboard();
        }

        async function loadDashboard() {
            const container = document.getElementById('assignments-container');
            try {
                const [aRes, sRes] = await Promise.all([
                    fetch(`${API_URL}/assignments`).then(r => r.json()),
                    fetch(`${API_URL}/submissions`).then(r => r.json())
                ]);
                const assignments = aRes.data || [], subsAll = sRes.data || [];
                
                container.innerHTML = assignments.map(quiz => {
                    const subs = subsAll.filter(s => s.assignment_id === quiz.id);
                    return `
                    <div class="bg-white rounded-[2rem] shadow-xl border overflow-hidden">
                        <div class="p-6 flex justify-between items-start">
                            <div>
                                <h4 class="font-black text-slate-800 text-lg">${quiz.title || 'Quiz'}</h4>
                                <span class="bg-yellow-100 text-yellow-800 text-[10px] font-black px-2 py-0.5 rounded-full uppercase">${quiz.short_code}</span>
                            </div>
                            <button onclick="deleteQuiz('${quiz.id}')" class="bg-red-50 text-red-500 px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase active:bg-red-500 active:text-white transition">Delete</button>
                        </div>
                        <details class="border-t border-slate-50">
                            <summary class="p-3 text-center list-none cursor-pointer text-[9px] font-black text-blue-500 uppercase tracking-widest">View Results (${subs.length})</summary>
                            <div class="p-4 bg-slate-50 space-y-2">
                                ${subs.map(s => `<div class="flex justify-between text-xs"><b>${s.student_name}</b> <span>${s.score}/${Object.keys(quiz.master_key).length}</span></div>`).join('')}
                            </div>
                        </details>
                    </div>`;
                }).join('');
            } catch (e) { container.innerHTML = "Error loading."; }
        }

        function addQ() {
            const list = document.getElementById('q-list');
            const num = list.children.length + 1;
            const div = document.createElement('div');
            div.className = "flex gap-2 mb-2";
            div.innerHTML = `<input class="w-12 p-3 border rounded-xl q-num" value="${num}" readonly><input class="flex-1 p-3 border rounded-xl q-ans font-bold" placeholder="Ans">`;
            list.appendChild(div);
        }

        async function saveQuiz() {
            const btn = document.getElementById('saveBtn');
            const title = document.getElementById('title').value;
            const answers = {};
            document.querySelectorAll('.q-ans').forEach((input, i) => { answers[i+1] = input.value; });
            const fd = new FormData();
            fd.append('title', title);
            fd.append('master_key', JSON.stringify(answers));
            const res = await fetch(`${API_URL}/create-assignment`, { method: 'POST', body: fd }).then(r => r.json());
            document.getElementById('finalCode').innerText = res.short_code;
            document.getElementById('codeBox').classList.remove('hidden');
            loadDashboard();
        }
        loadDashboard();
    </script>
</body>
</html>
