<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathsPal Admin - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans p-4 text-slate-900 pb-20">
    <div class="max-w-md mx-auto space-y-6">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-black italic tracking-tighter text-slate-800">Maths<span class="text-yellow-500 underline">Pal</span> Admin</h1>
            <!-- UPDATED REFRESH BUTTON WITH FEEDBACK -->
            <button id="refreshBtn" onclick="loadDashboard()" class="bg-white px-4 py-2 rounded-full shadow-md border border-slate-200 text-[10px] font-black uppercase tracking-widest active:bg-slate-100 transition">Refresh</button>
        </div>
        
        <!-- QUIZ CREATOR -->
        <details class="bg-slate-900 rounded-3xl overflow-hidden shadow-xl border-b-4 border-yellow-500">
            <summary class="p-5 font-black text-xs uppercase cursor-pointer text-yellow-400 text-center tracking-[0.2em]">➕ Create New Quiz</summary>
            <div class="bg-white p-6 space-y-4 rounded-b-3xl">
                <input id="title" type="text" placeholder="Quiz Title" class="w-full p-4 border-2 border-slate-50 rounded-2xl bg-slate-50 outline-none focus:border-yellow-400 font-bold">
                <div id="q-list"><div class="flex gap-2 mb-2"><input class="w-12 p-3 border rounded-xl q-num bg-white text-center font-black" value="1" readonly><input class="flex-1 p-3 border rounded-xl q-ans font-bold" placeholder="Answer"></div></div>
                <button onclick="addQ()" class="text-blue-600 font-black text-[10px] uppercase tracking-tighter">+ Add Question</button>
                <button id="saveBtn" onclick="saveQuiz()" class="w-full py-4 bg-slate-900 text-yellow-400 rounded-2xl font-black shadow-lg uppercase tracking-widest">Generate Code</button>
                <div id="codeBox" class="hidden bg-yellow-400 p-6 rounded-[2rem] text-center shadow-inner mt-4 font-black text-3xl text-slate-900 italic">CODE: <span id="finalCode">---</span></div>
            </div>
        </details>

        <h3 class="font-black text-[11px] uppercase tracking-[0.2em] text-slate-400 pl-2">Assignments & Analytics</h3>

        <!-- ASSIGNMENT LIST -->
        <div id="assignments-container" class="space-y-6">
            <p class="text-center text-slate-300 italic py-10 text-xs animate-pulse">Loading dashboard...</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://mathspal-backend.onrender.com';

        function addQ() {
            const list = document.getElementById('q-list');
            const num = list.children.length + 1;
            const div = document.createElement('div');
            div.className = "flex gap-2 mb-2";
            div.innerHTML = `<input class="w-12 p-3 border rounded-xl q-num bg-white text-center font-black" value="${num}" readonly><input class="flex-1 p-3 border rounded-xl q-ans font-bold" placeholder="Ans">`;
            list.appendChild(div);
        }

        async function saveQuiz() {
            const btn = document.getElementById('saveBtn');
            const title = document.getElementById('title').value;
            if(!title) return alert("Give your quiz a title!");
            btn.innerText = "SAVING...";
            const answers = {};
            document.querySelectorAll('.q-ans').forEach((input, i) => { answers[i+1] = input.value; });
            const fd = new FormData();
            fd.append('title', title);
            fd.append('master_key', JSON.stringify(answers));
            const res = await fetch(`${API_URL}/create-assignment`, { method: 'POST', body: fd }).then(r => r.json());
            document.getElementById('finalCode').innerText = res.short_code;
            document.getElementById('codeBox').classList.remove('hidden');
            btn.innerText = "GENERATE CODE";
            loadDashboard();
        }

        async function loadDashboard() {
            const container = document.getElementById('assignments-container');
            const refreshBtn = document.getElementById('refreshBtn');
            
            // Show the teacher the refresh is working
            refreshBtn.innerText = "LOADING...";
            refreshBtn.disabled = true;

            try {
                const [aRes, sRes] = await Promise.all([
                    fetch(`${API_URL}/assignments`).then(r => r.json()),
                    fetch(`${API_URL}/submissions`).then(r => r.json())
                ]);

                const assignments = aRes.data || [];
                const allSubmissions = sRes.data || [];

                if (assignments.length === 0) {
                    container.innerHTML = '<p class="text-center text-slate-300 py-10 text-xs">No quizzes yet.</p>';
                } else {
                    container.innerHTML = assignments.map(quiz => {
                        const subs = allSubmissions.filter(s => s.assignment_id === quiz.id);
                        let stats = {};
                        subs.forEach(s => {
                            if (s.results_json) {
                                s.results_json.forEach(res => {
                                    if (!stats[res.q]) stats[res.q] = { correct: 0, total: 0 };
                                    stats[res.q].total++;
                                    if (res.status === 'correct') stats[res.q].correct++;
                                });
                            }
                        });

                        const totalQs = Object.keys(quiz.master_key).length;
                        const avg = subs.length > 0 ? Math.round((subs.reduce((a,b) => a + (b.score || 0), 0) / (subs.length * totalQs)) * 100) : 0;

                        return `
                        <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden">
                            <div class="p-6 flex justify-between items-center">
                                <div>
                                    <h4 class="font-black text-slate-800 text-lg tracking-tighter">${quiz.title || 'Quiz'}</h4>
                                    <span class="bg-yellow-100 text-yellow-800 text-[10px] font-black px-2 py-0.5 rounded-full tracking-widest uppercase">${quiz.short_code}</span>
                                </div>
                                <div class="text-right">
                                    <p class="text-[8px] font-black text-slate-300 uppercase mb-1 leading-none">Avg Score</p>
                                    <p class="text-xl font-black ${avg < 50 && subs.length > 0 ? 'text-red-500' : 'text-green-600'}">${avg}%</p>
                                </div>
                            </div>
                            <details class="border-t border-slate-50 group">
                                <summary class="p-4 text-center list-none cursor-pointer hover:bg-slate-50 transition">
                                    <span class="text-[9px] font-black text-blue-500 tracking-[0.2em] group-open:hidden uppercase">View Stats & Scores (${subs.length})</span>
                                    <span class="text-[9px] font-black text-slate-400 tracking-[0.2em] hidden group-open:inline uppercase">Close Details</span>
                                </summary>
                                <div class="p-6 space-y-6 bg-white border-t border-slate-50 text-center">
                                    <div class="bg-slate-50 rounded-2xl overflow-hidden border border-slate-100">
                                        <table class="w-full text-left text-[10px]">
                                            <thead class="bg-slate-100 text-slate-400 font-black uppercase">
                                                <tr><th class="p-3 font-bold">Q#</th><th class="p-3 text-center">Correct</th><th class="p-3 text-right">Pass %</th></tr>
                                            </thead>
                                            <tbody class="divide-y divide-slate-100">
                                                ${Object.keys(stats).sort((a,b)=>a-b).map(qNum => {
                                                    const s = stats[qNum];
                                                    const rate = Math.round((s.correct / s.total) * 100);
                                                    return `<tr><td class="p-3 font-bold text-slate-500">Q${qNum}</td><td class="p-3 text-center text-green-600 font-bold">${s.correct}/${s.total}</td><td class="p-3 text-right font-black ${rate < 50 ? 'text-red-600' : 'text-slate-900'}">${rate}% ${rate<50 ? '🚩':''}</td></tr>`
                                                }).join('')}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div class="space-y-2">
                                        ${subs.map(s => `<div class="flex justify-between p-3 bg-slate-50 rounded-xl text-xs shadow-sm border border-slate-100"><b>${s.student_name}</b> <span class="font-black text-slate-400">${s.score}/${totalQs}</span></div>`).join('')}
                                    </div>
                                </div>
                            </details>
                        </div>`;
                    }).join('');
                }
            } catch (e) {
                container.innerHTML = `<p class="text-red-500 font-black text-center text-[10px]">DATABASE ERROR. RETRYING...</p>`;
            } finally {
                // Reset the button so the teacher can tap it again
                refreshBtn.innerText = "REFRESH";
                refreshBtn.disabled = false;
            }
        }
        loadDashboard();
    </script>
</body>
</html>
