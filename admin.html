<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathsPal Admin - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Supabase Library First -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans p-4 text-slate-900 pb-20">
    <div id="app-content" class="max-w-md mx-auto space-y-6">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-black italic tracking-tighter text-slate-800">Maths<span class="text-yellow-500 underline">Pal</span> Admin</h1>
            <button id="refBtn" onclick="loadDashboard()" class="bg-white px-4 py-2 rounded-full shadow-md border text-[10px] font-black uppercase tracking-widest active:bg-slate-100 transition">Refresh</button>
        </div>
        
        <!-- QUIZ CREATOR -->
        <details class="bg-slate-900 rounded-3xl overflow-hidden shadow-xl border-b-4 border-yellow-500">
            <summary class="p-5 font-black text-xs uppercase cursor-pointer text-yellow-400 text-center">➕ Create New Quiz</summary>
            <div class="bg-white p-6 space-y-4 rounded-b-3xl text-center border-t">
                <input id="title" type="text" placeholder="Quiz Title" class="w-full p-4 border-2 border-slate-50 rounded-2xl outline-none font-bold bg-slate-50 focus:border-yellow-400">
                <div id="q-list"><div class="flex gap-2 mb-2"><input class="w-12 p-3 border rounded-xl q-num bg-white text-center font-black" value="1" readonly><input class="flex-1 p-3 border rounded-xl q-ans font-bold text-center" placeholder="Ans"></div></div>
                <button onclick="addQ()" class="text-blue-600 font-black text-[10px] uppercase tracking-tighter">+ Add Question</button>
                <button id="saveBtn" onclick="saveQuiz()" class="w-full py-4 bg-slate-900 text-yellow-400 rounded-2xl font-black shadow-lg uppercase tracking-widest">Generate Code</button>
                <div id="codeBox" class="hidden bg-yellow-400 p-6 rounded-[2rem] text-center mt-4 font-black text-3xl italic text-slate-900">CODE: <span id="finalCode">---</span></div>
            </div>
        </details>

        <h3 class="font-black text-[11px] uppercase tracking-[0.2em] text-slate-400 pl-2">Assignments & Analytics</h3>
        <div id="assignments-container" class="space-y-6"></div>
        
        <button onclick="handleLogout()" class="w-full py-3 text-slate-400 font-bold text-xs uppercase tracking-widest mt-10">Sign Out</button>
    </div>

    <script>
        // 1. Initialize Supabase
        const API_URL = 'https://mathspal-backend.onrender.com';
        const S_URL = 'https://ykdehazdwinllvjsmrd.supabase.co'; 
        const S_KEY = 'sb_publishable_Usp4A-ts9B6wBS1_XxJjVA_IZpwPMCn'; 
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        // 2. THE SECURITY GUARD (checkUser)
        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                // If not logged in, redirect to login page
                window.location.href = 'login.html';
            } else {
                // If logged in, load the data
                loadDashboard();
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        // --- DASHBOARD LOGIC ---

            const container = document.getElementById('assignments-container');
            const btn = document.getElementById('refBtn');
            btn.innerText = "WAIT...";

                    fetch(`${API_URL}/assignments`).then(r => r.json()),
                    fetch(`${API_URL}/submissions`).then(r => r.json())
                ]);
                const assignments = aRes.data || [], allSubs = sRes.data || [];
                
                if (assignments.length === 0) {
                    container.innerHTML = '<p class="text-center text-slate-300 py-10 text-xs">No assignments yet.</p>';
                } else {
                    container.innerHTML = assignments.map(quiz => {
                        const subs = allSubs.filter(s => s.assignment_id === quiz.id);

                            if (s.results_json) {
                                s.results_json.forEach(res => {
                                    if (!stats[res.q]) stats[res.q] = { correct: 0, total: 0 };
                                    stats[res.q].total++;
                                    if (res.status === 'correct') stats[res.q].correct++;
                                });
                            }
                        });
                        const totalQs = Object.keys(quiz.master_key).length;

                            <div class="p-6 flex justify-between items-start">
                                <div>
