<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathsPal Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans p-4 text-slate-900 pb-20">
    <div class="max-w-md mx-auto space-y-6">
        
        <!-- HEADER WITH TEACHER NAME -->
        <div class="flex justify-between items-start pt-4">
            <h1 class="text-3xl font-black italic tracking-tighter text-slate-800 leading-none">Maths<span class="text-yellow-500 underline">Pal</span></h1>
            <div class="text-right">
                <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest leading-none">Active Teacher</p>
                <p id="teacherNameDisplay" class="font-black text-xs text-slate-600">---</p>
            </div>
        </div>

        <div class="flex justify-end">
             <button id="refBtn" onclick="loadDashboard()" class="bg-white px-4 py-1 rounded-full shadow-sm border text-[9px] font-black uppercase tracking-widest active:bg-slate-100">Refresh Data</button>
        </div>
        
        <!-- (Keep Quiz Creator and Dashboard Container exactly as before) -->
        <details class="bg-slate-900 rounded-3xl overflow-hidden shadow-xl border-b-4 border-yellow-500">
            <summary class="p-5 font-black text-xs uppercase cursor-pointer text-yellow-400 text-center tracking-widest">➕ Create New Quiz</summary>
            <div class="bg-white p-6 space-y-4 rounded-b-3xl text-center border-t">
                <input id="title" type="text" placeholder="Quiz Title" class="w-full p-4 border-2 border-slate-50 rounded-2xl outline-none font-bold bg-slate-50 focus:border-yellow-400">
                <div id="q-list"><div class="flex gap-2 mb-2"><input class="w-12 p-3 border rounded-xl q-num bg-white text-center font-black" value="1" readonly><input class="flex-1 p-3 border rounded-xl q-ans font-bold text-center" placeholder="Ans"></div></div>
                <button onclick="addQ()" class="text-blue-600 font-black text-[10px] uppercase tracking-tighter">+ Add Question</button>
                <button id="saveBtn" onclick="saveQuiz()" class="w-full py-4 bg-slate-900 text-yellow-400 rounded-2xl font-black shadow-lg uppercase tracking-widest">Generate Code</button>
                <div id="codeBox" class="hidden bg-yellow-400 p-6 rounded-[2rem] text-center mt-4 font-black text-3xl italic text-slate-900">CODE: <span id="finalCode">---</span></div>
            </div>
        </details>

        <div id="assignments-container" class="space-y-6"></div>

        <button onclick="handleLogout()" class="w-full py-4 text-slate-300 font-black text-[9px] uppercase tracking-[0.4em] mt-10">Sign Out of Session</button>
    </div>

    <script>
        const API_URL = 'https://mathspal-backend.onrender.com';

        function checkUser() {
            const session = localStorage.getItem('mp_session');
            const name = localStorage.getItem('mp_name');
            if (!session) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('teacherNameDisplay').innerText = name || "Professor";
                loadDashboard();
            }
        }

        function handleLogout() {
            localStorage.removeItem('mp_session');
            localStorage.removeItem('mp_name');
            window.location.href = 'login.html';
        }

        // --- DASHBOARD LOGIC (Grouped by Assignment) ---

        async function loadDashboard() {
            const container = document.getElementById('assignments-container');
            const btn = document.getElementById('refBtn');
            btn.innerText = "WAIT...";

            try {
                const [aRes, sRes] = await Promise.all([
                    fetch(`${API_URL}/assignments`).then(r => r.json()),
                    fetch(`${API_URL}/submissions`).then(r => r.json())
                ]);

                const assignments = aRes.data || [], allSubs = sRes.data || [];
                
                container.innerHTML = assignments.map(quiz => {
                    const subs = allSubs.filter(s => s.assignment_id === quiz.id);
                    let stats = {};
                    subs.forEach(s => {
                        if (s.results_json) {
                            s.results_json.forEach(res => {
                                if (!stats[res.q]) stats[res.q] = { correct: 0, total: 0 };
                                stats[res.q].total++;
                                if (res.status === 'correct') stats[res.q].correct++;
                            });
                        }
                    });

                    const totalQs = Object.keys(quiz.master_key).length;
                    const avg = subs.length > 0 ? Math.round((subs.reduce((a,b) => a + (b.score || 0), 0) / (subs.length * totalQs)) * 100) : 0;

                    return `
                    <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden mb-6">
                        <div class="p-6 flex justify-between items-center">
                            <div>
                                <h4 class="font-black text-slate-800 text-lg tracking-tighter">${quiz.title || 'Quiz'}</h4>
                                <span class="bg-yellow-100 text-yellow-800 text-[10px] font-black px-2 py-0.5 rounded-full tracking-widest uppercase italic">${quiz.short_code}</span>
                            </div>
                            <div class="text-right">
                                <p class="text-[8px] font-black text-slate-300 uppercase mb-1 leading-none">Avg Score</p>
                                <p class="text-xl font-black ${avg < 50 && subs.length > 0 ? 'text-red-500' : 'text-green-600'}">${avg}%</p>
                            </div>
                        </div>

                        <details class="border-t border-slate-50 group">
                            <summary class="p-4 text-center list-none cursor-pointer hover:bg-slate-50 transition">
                                <span class="text-[9px] font-black text-blue-500 tracking-[0.2em] group-open:hidden uppercase">View Analytics & Scores (${subs.length})</span>
                                <span class="text-[9px] font-black text-slate-400 tracking-[0.2em] hidden group-open:inline uppercase">Close Details</span>
                            </summary>
                            
                            <div class="p-6 bg-slate-50 space-y-6 text-center">
                                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-200">
                                    <table class="w-full text-left text-[10px]">
                                        <thead class="bg-slate-100 text-slate-400 font-black uppercase">
                                            <tr><th class="p-3">Q#</th><th class="p-3 text-center">Correct</th><th class="p-3 text-right">Pass %</th></tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-100">
                                            ${Object.keys(stats).sort((a,b)=>a-b).map(qNum => {
                                                const s = stats[qNum];
                                                const rate = Math.round((s.correct / s.total) * 100);
                                                return `<tr><td class="p-3 font-bold text-slate-500">Q${qNum}</td><td class="p-3 text-center text-green-600 font-bold">${s.correct}/${s.total}</td><td class="p-3 text-right font-black ${rate < 50 ? 'text-red-600' : 'text-slate-900'}">${rate}% ${rate<50 ? '🚩':''}</td></tr>`
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                                <div class="space-y-2">
                                    ${subs.map(s => `<div class="flex justify-between p-3 bg-white rounded-xl text-xs shadow-sm border"><b>${s.student_name}</b> <span class="font-black text-slate-400">${s.score}/${totalQs}</span></div>`).join('')}
                                </div>
                            </div>
                        </details>
                    </div>`;
                }).join('');
            } catch (e) { container.innerHTML = "Error loading data."; }
            btn.innerText = "REFRESH";
        }

        function addQ() {
            const list = document.getElementById('q-list');
            const num = list.children.length + 1;
            const div = document.createElement('div');
            div.className = "flex gap-2 mb-2";
            div.innerHTML = `<input class="w-12 p-3 border rounded-xl q-num text-center font-black text-slate-300" value="${num}" readonly><input class="flex-1 p-3 border rounded-xl q-ans font-bold text-center" placeholder="Ans">`;
            list.appendChild(div);
        }

        async function saveQuiz() {
            const btn = document.getElementById('saveBtn');
            const title = document.getElementById('title').value;
            if(!title) return alert("Title required!");
            btn.innerText = "SAVING...";
            const answers = {};
            document.querySelectorAll('.q-ans').forEach((input, i) => { if(input.value) answers[i+1] = input.value; });
            const fd = new FormData();
            fd.append('title', title);
            fd.append('master_key', JSON.stringify(answers));
            const res = await fetch(`${API_URL}/create-assignment`, { method: 'POST', body: fd }).then(r => r.json());
            document.getElementById('finalCode').innerText = res.short_code;
            document.getElementById('codeBox').classList.remove('hidden');
            btn.innerText = "GENERATE CODE";
            loadDashboard();
        }

        checkUser();
    </script>
</body>
</html>
